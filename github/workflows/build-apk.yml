name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Structure
      run: |
        mkdir -p app/src/main/java/com/wahid/wbcamera
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        [ -f MainActivity.kt ] && mv MainActivity.kt app/src/main/java/com/wahid/wbcamera/
        [ -f DashboardActivity.kt ] && mv DashboardActivity.kt app/src/main/java/com/wahid/wbcamera/
        [ -f MockCameraService.kt ] && mv MockCameraService.kt app/src/main/java/com/wahid/wbcamera/
        [ -f VideoPlaybackService.kt ] && mv VideoPlaybackService.kt app/src/main/java/com/wahid/wbcamera/
        [ -f activity_main.xml ] && mv activity_main.xml app/src/main/res/layout/
        [ -f activity_dashboard.xml ] && mv activity_dashboard.xml app/src/main/res/layout/
        [ -f colors.xml ] && mv colors.xml app/src/main/res/values/
        [ -f strings.xml ] && mv strings.xml app/src/main/res/values/
        [ -f themes.xml ] && mv themes.xml app/src/main/res/values/
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
        [ -f proguard-rules.pro ] && mv proguard-rules.pro app/
        cp build.gradle app/build.gradle
        ICON='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1a1a2e" android:pathData="M0,0h108v108h-108z"/><path android:fillColor="#4CAF50" android:pathData="M54,20L88,54L54,88L20,54Z"/></vector>'
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi; do
          echo "$ICON" > app/src/main/res/$dir/ic_launcher.xml
          echo "$ICON" > app/src/main/res/$dir/ic_launcher_round.xml
        done

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WBCamera-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
