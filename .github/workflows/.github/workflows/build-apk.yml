# Build WB Camera
name: Build WB Camera APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android Project Structure
      run: |
        mkdir -p app/src/main/java/com/wahid/wbcamera
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mv MainActivity.kt app/src/main/java/com/wahid/wbcamera/ 2>/dev/null || true
        mv DashboardActivity.kt app/src/main/java/com/wahid/wbcamera/ 2>/dev/null || true
        mv MockCameraService.kt app/src/main/java/com/wahid/wbcamera/ 2>/dev/null || true
        mv VideoPlaybackService.kt app/src/main/java/com/wahid/wbcamera/ 2>/dev/null || true
        mv activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
        mv activity_dashboard.xml app/src/main/res/layout/ 2>/dev/null || true
        mv colors.xml app/src/main/res/values/ 2>/dev/null || true
        mv strings.xml app/src/main/res/values/ 2>/dev/null || true
        mv themes.xml app/src/main/res/values/ 2>/dev/null || true
        mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
        mv proguard-rules.pro app/ 2>/dev/null || true
        cp build.gradle app/build.gradle

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create Icons
      run: |
        echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1a1a2e" android:pathData="M0,0h108v108h-108z"/><path android:fillColor="#4CAF50" android:pathData="M54,30 L78,54 L54,78 L30,54 Z"/></vector>' > app/src/main/res/mipmap-hdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher_round.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher_round.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher_round.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher_round.xml

    - name: Setup Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: WBCamera-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
